<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f9;
            margin: 0;
        }
        .product-card {
            border:2px solid #333;
            border-radius: 12px;
            margin:20px auto;
            height:80%;
            overflow: hidden;
            padding: 15px;
        }
        .product-card img {
            max-width: 100%;
            min-width: 200px;
            display: block;
            object-fit: cover;
            height: 180px;
        }
        .card-content h2{
            margin: 10px;
        }
        .card-content p {
            color:#666;
            line-height: 1.5;
            margin: 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
   <div class="product-card">
      <img class="product-image" src="https://www.fastrack.in/dw/image/v2/BKDD_PRD/on/demandware.static/-/Sites-titan-master-catalog/default/dwe63ff829/images/Fastrack/Catalog/FV60024WM01W_1.jpg?sw=600&sh=600" alt="product product-image">
       <h2 class="card-content">minimalist watch</h2>
       <p class="card-content">A sleek, timeless timepiece featuring a genuing lather strap and a scratch-resistant minimalist face. perfect for everyday elegance.
       </p>

   </div>
    
</body>
</html>
